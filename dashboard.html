<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yahoo Monitor 控制面板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d9dee7;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --ok: #15803d;
      --off: #9ca3af;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Helvetica Neue", sans-serif;
    }

    header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
    }

    .toolbar,
    .summary,
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 14px;
      margin-bottom: 16px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      margin-bottom: 16px;
      background: var(--line);
    }

    .metric {
      padding: 16px;
      background: var(--panel);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
      word-break: break-word;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      background: #fbfcfe;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #edf2ff;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .badge.off {
      background: #f3f4f6;
      color: var(--off);
    }

    .badge.on {
      background: #e8f7ee;
      color: var(--ok);
    }

    .muted {
      color: var(--muted);
    }

    input[type="file"] {
      max-width: 100%;
    }

    button {
      min-height: 36px;
      padding: 0 14px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      background: var(--off);
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    select,
    input[type="number"],
    input[type="text"] {
      width: 100%;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 8px;
      background: #ffffff;
      color: var(--text);
    }

    @media (max-width: 760px) {
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      th:nth-child(5),
      td:nth-child(5),
      th:nth-child(6),
      td:nth-child(6) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Yahoo Monitor 控制面板</h1>
    <div id="subtitle" class="muted">选择 app_state.json 查看和编辑监控任务。</div>
  </header>

  <main>
    <section class="toolbar">
      <div>
        <strong>任务配置预览</strong>
        <div class="muted">先运行：python export_app_state.py --output app_state.json</div>
      </div>
      <div>
        <input id="stateFile" type="file" accept="application/json,.json">
        <button id="downloadTasks" disabled>下载 watch_tasks.json</button>
      </div>
    </section>

    <section class="summary" aria-label="Summary">
      <div class="metric">
        <span>任务总数</span>
        <strong id="totalTasks">-</strong>
      </div>
      <div class="metric">
        <span>已启用</span>
        <strong id="enabledTasks">-</strong>
      </div>
      <div class="metric">
        <span>已停用</span>
        <strong id="disabledTasks">-</strong>
      </div>
      <div class="metric">
        <span>版本</span>
        <strong id="version">-</strong>
      </div>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width: 18%">任务名</th>
            <th style="width: 9%">状态</th>
            <th style="width: 11%">平台</th>
            <th style="width: 19%">关键词</th>
            <th style="width: 12%">模式</th>
            <th style="width: 10%">间隔</th>
            <th style="width: 9%">分类</th>
            <th style="width: 12%">数量</th>
          </tr>
        </thead>
        <tbody id="taskRows">
          <tr>
            <td colspan="8" class="muted">尚未加载 app_state.json。</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById("stateFile");
    const downloadButton = document.getElementById("downloadTasks");
    const rows = document.getElementById("taskRows");
    let currentState = null;

    function text(value) {
      return value === null || value === undefined || value === "" ? "-" : String(value);
    }

    function escapeHtml(value) {
      return text(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeAttr(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function setText(id, value) {
      document.getElementById(id).textContent = text(value);
    }

    function normalizeTask(task) {
      const modeMap = {
        "dry-run": { dry_run: true, notify: false },
        silent: { dry_run: false, notify: false },
        notify: { dry_run: false, notify: true }
      };
      const mode = task.mode || "notify";
      const flags = modeMap[mode] || modeMap.notify;

      const source = task.source || "yahoo";
      const keyword = task.keyword || "";

      return {
        task_name: task.task_name || `${source} | ${keyword}`,
        source,
        keyword,
        interval: Number(task.interval) || 2,
        category_key: task.category_key || "all",
        category_id: task.category_id ?? null,
        mode,
        dry_run: flags.dry_run,
        notify: flags.notify,
        max_price: task.max_price ?? null,
        blocked_title_keywords: task.blocked_title_keywords ?? null,
        limit: task.limit === "" || task.limit === undefined ? null : task.limit,
        enabled: task.enabled !== false
      };
    }

    function updateSummary() {
      if (!currentState) {
        return;
      }

      const tasks = currentState.tasks || [];
      const enabled = tasks.filter((task) => task.enabled !== false).length;

      currentState.summary = {
        ...(currentState.summary || {}),
        total: tasks.length,
        enabled,
        disabled: tasks.length - enabled
      };

      setText("totalTasks", currentState.summary.total);
      setText("enabledTasks", currentState.summary.enabled);
      setText("disabledTasks", currentState.summary.disabled);
    }

    function updateTask(index, field, value) {
      if (!currentState || !currentState.tasks[index]) {
        return;
      }

      const task = currentState.tasks[index];

      if (field === "enabled") {
        task.enabled = value;
      } else if (field === "source") {
        task.source = value;
        task.task_name = `${value} | ${task.keyword || ""}`;
      } else if (field === "keyword") {
        task.keyword = value.trim();
        task.task_name = `${task.source || "yahoo"} | ${task.keyword}`;
      } else if (field === "interval") {
        task.interval = Number(value) || 2;
      } else if (field === "limit") {
        task.limit = value === "" ? null : Number(value);
      } else if (field === "mode") {
        task.mode = value;
        Object.assign(task, normalizeTask(task));
      }

      currentState.tasks[index] = normalizeTask(task);
      updateSummary();
    }

    function sourceOptions(selectedSource) {
      const sources = currentState?.schema?.sources || ["yahoo", "mercari"];

      return sources.map((source) => {
        const selected = source === selectedSource ? "selected" : "";
        return `<option value="${source}" ${selected}>${source}</option>`;
      }).join("");
    }

    function taskModeOptions(selectedMode) {
      const modes = currentState?.schema?.modes || {
        "dry-run": {},
        silent: {},
        notify: {}
      };

      return Object.keys(modes).map((mode) => {
        const selected = mode === selectedMode ? "selected" : "";
        return `<option value="${mode}" ${selected}>${mode}</option>`;
      }).join("");
    }

    function renderState(state) {
      currentState = state;
      const summary = state.summary || {};
      const app = state.app || {};
      const tasks = state.tasks || [];

      document.getElementById("subtitle").textContent = app.name || "Yahoo Monitor";
      setText("totalTasks", summary.total);
      setText("enabledTasks", summary.enabled);
      setText("disabledTasks", summary.disabled);
      setText("version", app.version);
      downloadButton.disabled = false;

      rows.innerHTML = "";

      if (!tasks.length) {
        rows.innerHTML = '<tr><td colspan="8" class="muted">尚未配置任务。</td></tr>';
        return;
      }

      for (const [index, task] of tasks.entries()) {
        const enabled = task.enabled !== false;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${escapeHtml(task.task_name)}</td>
          <td>
            <select data-index="${index}" data-field="enabled">
              <option value="true" ${enabled ? "selected" : ""}>启用</option>
              <option value="false" ${enabled ? "" : "selected"}>停用</option>
            </select>
          </td>
          <td>
            <select data-index="${index}" data-field="source">
              ${sourceOptions(task.source)}
            </select>
          </td>
          <td>
            <input data-index="${index}" data-field="keyword" type="text" value="${escapeAttr(task.keyword)}">
          </td>
          <td>
            <select data-index="${index}" data-field="mode">
              ${taskModeOptions(task.mode)}
            </select>
          </td>
          <td>
            <input data-index="${index}" data-field="interval" type="number" min="0.5" step="0.5" value="${text(task.interval)}">
          </td>
          <td>${text(task.category_key)}</td>
          <td>
            <input data-index="${index}" data-field="limit" type="number" min="1" step="1" value="${task.limit ?? ""}" placeholder="不限">
          </td>
        `;
        rows.appendChild(row);
      }
    }

    rows.addEventListener("change", (event) => {
      const element = event.target;
      const index = Number(element.dataset.index);
      const field = element.dataset.field;

      if (!field || Number.isNaN(index)) {
        return;
      }

      const value = field === "enabled"
        ? element.value === "true"
        : element.value;

      updateTask(index, field, value);
    });

    downloadButton.addEventListener("click", () => {
      if (!currentState) {
        return;
      }

      const tasks = (currentState.tasks || []).map(normalizeTask);
      const blob = new Blob(
        [JSON.stringify(tasks, null, 2) + "\n"],
        { type: "application/json" }
      );
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "watch_tasks.json";
      link.click();
      URL.revokeObjectURL(url);
    });

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) {
        return;
      }

      try {
        const state = JSON.parse(await file.text());
        renderState(state);
      } catch (error) {
        rows.innerHTML = `<tr><td colspan="8">JSON 加载失败：${error.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
